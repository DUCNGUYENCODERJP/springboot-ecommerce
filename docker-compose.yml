version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: luxury-hotel-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: luxury_hotel
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
    container_name: luxury-hotel-app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/luxury_hotel?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: root
      JWT_SECRET: VGhpc0lzQVNlY3VyZUJhc2U2NEtleUZvckx1eHVyeUhvdGVsQXBwMTIzNDU2Nzg5MDEyMzQ1Njc4OTA=
      JWT_EXPIRATION_MINUTES: 60
      JWT_ISSUER: luxury-hotel
    ports:
      - "8080:8080"

volumes:
  mysql_data:
